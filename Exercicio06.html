<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06</title>
</head>
<body>
    <div>
        Faça o exercício 5 com a utilização de uma arrow function.
    </div>
    <script>

        // Definição de uma Arrow Function (Função de Seta).
        // A sintaxe elimina a necessidade da palavra-chave 'function'.
        mostraFrase = (nome, sobrenome) => {
            // Como há um bloco de chaves { }, o uso do 'return' é obrigatório 
            // para enviar o valor de volta para quem chamou a função.
            return '<br/>Olá, Eu sou ' + nome + ' ' + sobrenome + '.';
        }

        // Chamada da função passando os argumentos e exibindo no navegador.
        document.write(mostraFrase("Esmeraldo", "Junior"));

    </script>
</body>
</html>
