<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 08</title>
</head>
<body>
    <div>
        Faça o exercício 7 com a utilização de uma arrow function.
    </div>
    <script>

        // Conversão para Arrow Function:
        // Note que o nome da variável armazena a referência da função de seta.
        descobrirDiametro = (raio) => {
            // O uso de chaves { } define um corpo de função, exigindo o 'return' 
            // para que o valor calculado seja enviado de volta à chamada.
            return '<br/><strong>O diâmetro é: </strong>' + 2 * raio;
        }

        // Execução passando o raio 6.
        // O motor do JS resolve o cálculo (2 * 6) e concatena com a string HTML.
        document.write(descobrirDiametro(6));

    </script>
</body>
</html>
